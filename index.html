<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding RSVP</title>
    <style>
        /* Google Sheets API Deployment URL - Update this with your Apps Script URL */
        :root {
            --primary-color: #d4a574;
            --secondary-color: #333;
            --light-bg: #f9f7f4;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--light-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            background: var(--white);
            padding: 3rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: var(--secondary-color);
            text-align: center;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--secondary-color);
            font-weight: 600;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(212, 165, 116, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .radio-group {
            display: flex;
            gap: 2rem;
            margin-top: 0.5rem;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            font-weight: normal;
            gap: 0.5rem;
        }

        input[type="radio"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #c69560;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .message {
            text-align: center;
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 2rem 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .radio-group {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RSVP</h1>
        <p class="subtitle">Please let us know if you can attend</p>

        <form id="rsvpForm" onsubmit="handleSubmit(event)">
            <!-- Name -->
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required>
            </div>

            <!-- Attendance -->
            <div class="form-group">
                <label>Will you be attending? *</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="attendance" value="Yes" required>
                        Yes, I'll be there!
                    </label>
                    <label>
                        <input type="radio" name="attendance" value="No" required>
                        I'm unable to attend
                    </label>
                </div>
            </div>

            <!-- Requires Accommodation -->
            <div class="form-group">
                <label>Do you require accommodation? *</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="accommodation" value="Yes" required>
                        Yes
                    </label>
                    <label>
                        <input type="radio" name="accommodation" value="No" required>
                        No
                    </label>
                </div>
            </div>

            <!-- Meat/Veg Meal -->
            <div class="form-group">
                <label>Meal preference *</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="mealPreference" value="Meat" required>
                        Meat
                    </label>
                    <label>
                        <input type="radio" name="mealPreference" value="Vegetarian" required>
                        Vegetarian
                    </label>
                </div>
            </div>

            <!-- Other Meal Restrictions -->
            <div class="form-group">
                <label for="mealRestrictions">Other meal restrictions/allergies</label>
                <textarea id="mealRestrictions" name="mealRestrictions" placeholder="Please let us know about any dietary requirements..."></textarea>
            </div>

            <!-- Other Notes -->
            <div class="form-group">
                <label for="otherNotes">Other notes</label>
                <textarea id="otherNotes" name="otherNotes" placeholder="Any other information you'd like to share..."></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn">Submit RSVP</button>

            <!-- Message -->
            <div id="message" class="message"></div>
        </form>
    </div>

    <script>
        // Replace this URL with your Google Apps Script deployment URL
        const GOOGLE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVsUxmuLkiET9VhHc317wYslYaBuRw_Xsa45UI1Q-9HudgDsr0Tp-4uJdrH906NhuJ/exec";

        async function handleSubmit(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            const form = document.getElementById('rsvpForm');

            // Disable button during submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            // Collect form data
            const formData = new FormData(form);
            const data = {
                timestamp: new Date().toLocaleString(),
                name: formData.get('name'),
                attendance: formData.get('attendance'),
                accommodation: formData.get('accommodation'),
                mealPreference: formData.get('mealPreference'),
                mealRestrictions: formData.get('mealRestrictions'),
                otherNotes: formData.get('otherNotes')
            };

            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });

                // Show success message (no-cors mode doesn't return response data)
                messageDiv.className = 'message success';
                messageDiv.textContent = '✓ Thank you for your RSVP! We\'ve received your response.';
                form.reset();
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '✗ Error submitting form. Please try again.';
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit RSVP';
            }
        }
    </script>
</body>
</html>
